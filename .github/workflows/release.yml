name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -o build/node-${{ matrix.goos }}-${{ matrix.goarch }} -ldflags="-s -w" ./main.go

      - name: Create tarball
        run: |
          mkdir -p node-${{ matrix.goos }}-${{ matrix.goarch }}
          cp build/node-${{ matrix.goos }}-${{ matrix.goarch }} node-${{ matrix.goos }}-${{ matrix.goarch }}/
          tar czf node-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz node-${{ matrix.goos }}-${{ matrix.goarch }}/
          rm -rf node-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.goos }}-${{ matrix.goarch }}
          path: node-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec mv {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send notification
    runs-on: ubuntu-latest
    needs: release
    if: always() && startsWith(github.ref, 'refs/tags/')
    permissions:
      actions: read

    steps:
      - name: Collect build info
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jobs_json=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100")

          build_time=$(jq -r '
            .jobs[]
            | select(.name | startswith("Build "))
            | ((.completed_at // now) | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) -
              ((.started_at)          | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)
          ' <<<"$jobs_json" 2>/dev/null | awk '{s+=$1} END {print s+0}')

          echo "build_time=$build_time" >> $GITHUB_OUTPUT

      - name: Notify success
        if: needs.release.result == 'success'
        uses: containrrr/shoutrrr-action@v1
        with:
          url: ${{ secrets.TELEGRAM_URL }}
          message: |
            ✅ Новый релиз опубликован
            Репозиторий: ${{ github.repository }}
            Тег: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}

            ⏱ Время сборки: ${{ steps.info.outputs.build_time }} сек

            🔗 ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}

      - name: Notify failure
        if: needs.release.result == 'failure'
        uses: containrrr/shoutrrr-action@v1
        with:
          url: ${{ secrets.TELEGRAM_URL }}
          message: |
            ❌ Ошибка при сборке или публикации релиза
            Репозиторий: ${{ github.repository }}
            Тег: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}

            ⏱ Время до ошибки: ${{ steps.info.outputs.build_time }} сек

            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify cancelled
        if: needs.release.result == 'cancelled'
        uses: containrrr/shoutrrr-action@v1
        with:
          url: ${{ secrets.TELEGRAM_URL }}
          message: |
            ⚠️ Релиз отменён
            Репозиторий: ${{ github.repository }}
            Тег: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}

            ⏱ Время до отмены: ${{ steps.info.outputs.build_time }} сек

            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
